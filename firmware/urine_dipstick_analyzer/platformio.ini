; PlatformIO Project Configuration File
; Urine Dipstick Analyzer — ESP32-S3-DevKitC-1-N8R8 (8MB Flash, 8MB OPI PSRAM)
;
; Build with:  pio run
; Upload with: pio run -t upload
; Monitor:     pio device monitor

[platformio]
src_dir = .

[env:esp32-s3-devkitc-1]
platform = espressif32@^6.7.0  ; Arduino-ESP32 v2.0.x (LEDC v2 API)
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; --- Memory layout: 8MB Flash + 8MB OPI PSRAM ---
board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.arduino.memory_type = qio_opi

; --- Build flags ---
build_flags =
    ; PSRAM
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; Camera (ESP32-S3 has hardware DVP)
    -DCONFIG_OV2640_SUPPORT=1
    -DCAMERA_MODEL_ESP32S3_CUSTOM=1

    ; Logging
    -DCORE_DEBUG_LEVEL=3

; --- Library dependencies (versions known-good as of platformio registry 2026-05) ---
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit SHT31 Library@^2.2.2
    claws/BH1750@^1.3.0
    waspinator/AccelStepper@^1.64
    bblanchon/ArduinoJson@^7.1.0

; The OV2640 driver (esp_camera.h) ships with the espressif32 Arduino core
; (esp32-camera component) — no separate lib_deps entry required.
; The DS3231 and MAX17048 drivers in this firmware are bit-banged via Wire,
; so no Adafruit_RTClib / Adafruit_MAX1704X libs are required.
