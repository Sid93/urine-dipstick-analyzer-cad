name: Firmware Build

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-build.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/urine_dipstick_analyzer/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO + intelhex (esptool dep)
        run: |
          python -m pip install --upgrade pip
          pip install platformio intelhex

      - name: Build firmware for ESP32-S3-DevKitC-1
        working-directory: firmware/urine_dipstick_analyzer
        run: pio run

      - name: Report build size
        working-directory: firmware/urine_dipstick_analyzer
        run: |
          echo "## Firmware build" >> $GITHUB_STEP_SUMMARY
          ls -la .pio/build/esp32-s3-devkitc-1/firmware.bin || true
          pio run -t size 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true

      - name: Upload firmware.bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware/urine_dipstick_analyzer/.pio/build/esp32-s3-devkitc-1/firmware.bin
          retention-days: 30
